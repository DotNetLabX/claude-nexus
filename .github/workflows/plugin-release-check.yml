name: plugin-release-check

# Optional safety net for the release-plugin skill (NOT a session hook — CI only).
# Fails a PR if a plugin's behavior surface changed without a version bump, and runs
# `claude plugin validate` as an advisory schema check.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  version-bump-check:
    # Hard gate: a behavior-surface change must carry a version bump (cache is version-keyed).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the diff against the base resolves
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check version bump
        run: |
          BASE="${{ github.base_ref }}"
          if [ -n "$BASE" ]; then
            git fetch --quiet origin "$BASE"
            node scripts/bump-plugin.mjs --check --base "origin/$BASE"
          else
            # Push to main: origin/main IS the pushed HEAD, so the default base yields an empty
            # diff and the check always passed (audit B3). Diff against the pre-push tip instead.
            BEFORE="${{ github.event.before }}"
            if [ -n "$BEFORE" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ]; then
              node scripts/bump-plugin.mjs --check --base "$BEFORE"
            else
              node scripts/bump-plugin.mjs --check --base "HEAD~1"
            fi
          fi
      - name: Generated commands in sync (audit B5)
        # nexus only — nexus-dotnet ships no agents/commands (gen-commands no-ops there).
        run: |
          node scripts/gen-commands.mjs nexus
          git diff --exit-code plugins/nexus/commands

  tests:
    # Hard gate: T1 structural lint + T2 unit tests (tests/README.md). $0, offline, no model.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: T1 lint + T2 unit tests
        # Unquoted globs: bash expands them, so this works on any Node version.
        run: node --test tests/lint/*.test.mjs tests/unit/*.test.mjs
      - name: Fix-package reds (EXPECTED TO FAIL until the enforcement+relay package lands)
        # Visibility only — these are the TDD reds for roadmap items B.1/C.2-C.4
        # (docs/proposals/plugin-evaluation-2026-06.md). Promote into the hard gate
        # (move into tests/lint + tests/unit) when the fix package ships.
        continue-on-error: true
        run: node --test tests/red/*.test.mjs

  plugin-validate:
    # Advisory: validates plugin.json / frontmatter / hooks schema. continue-on-error until
    # CI auth for the claude CLI is confirmed; flip to required once green.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Validate plugins
        run: |
          claude plugin validate plugins/nexus --strict
          claude plugin validate plugins/nexus-dotnet --strict
